# ============================================================
# HYPRLOCK — CLEAN LIQUID GLASS STYLE
# Tuned for 1920x1080
# ============================================================

background {
    monitor =
    path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current

    blur_passes = 1

    contrast = 0.95
    brightness = 0.94
    vibrancy = 0.18
}

general {
    ignore_empty_input = true
    hide_cursor = true
}

animations {
    animation = fade, 1, 6, default
}

# ============================================================
# LOCK ICON
# ============================================================

label {
    monitor =
    text = 

    color = rgba(255,255,255,0.75)

    font_size = 26

    position = 0, 370

    halign = center
    valign = center
}

# ============================================================
# TIME — Clean Glass Style
# ============================================================

label {
    monitor =
    text = $TIME

    color = rgba(255,255,255,0.30)

    font_size = 150
    font_family = SF Pro Display Heavy

    position = 0, 250

    halign = center
    valign = center
}

# ============================================================
# DATE
# ============================================================

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"

    color = rgba(255,255,255,0.45)

    font_size = 30
    font_family = SF Pro Display Bold

    position = 0, 140

    halign = center
    valign = center
}

# ============================================================
# USER
# ============================================================

label {
    monitor =
    text = Hi, $USER

    color = rgba(255,255,255,0.80)

    font_size = 20
    font_family = SF Pro Display Medium

    position = 0, -40

    halign = center
    valign = center
}

# ============================================================
# PASSWORD FIELD
# ============================================================

input-field {
    monitor =

    size = 340, 65

    outline_thickness = 2

    outer_color = rgba(255,70,70,0.25)

    inner_color = rgba(255,255,255,0.04)

    font_color = rgba(255,255,255,0.95)

    placeholder_text = Input Password

    font_family = SF Pro Display Regular

    placeholder_color = rgba(255,255,255,0.45)

    rounding = 24

    blur = true
    blur_size = 8
    blur_passes = 2

    position = 0, -120

    halign = center
    valign = center
}

# ============================================================
# MUSIC PANEL (FIXED POSITION)
# ============================================================

shape {
    monitor =

    color = rgba(255,255,255,0.04)

    size = 460,120

    rounding = 18

    border_size = 1
    border_color = rgba(255,255,255,0.15)

    blur = true
    blur_size = 8
    blur_passes = 2

    position = 0, 35

    halign = center
    valign = bottom

    zindex = 0
}

image {
    monitor =
    path = $HOME/.config/hypr/scripts/music.webp

    size = 85

    rounding = 8

    border_size = 2
    border_color = rgba(255,70,70,0.25)

    reload_time = 2
    reload_cmd = ~/.config/hypr/scripts/hyprlock-music.sh --art

    position = -160, 55

    halign = center
    valign = bottom

    zindex = 1
}

label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --title)"

    color = rgba(255,255,255,0.90)

    font_size = 16
    font_family = SF Pro Display Medium

    position = 60,110

    halign = center
    valign = bottom

    zindex = 1
}

label {
    monitor =
    text = cmd[update:1000] echo "󰠃  $(~/.config/hypr/scripts/hyprlock-music.sh --artist)"

    color = rgba(255,255,255,0.70)

    font_size = 12
    font_family = SF Pro Display Regular

    position = 60,92

    halign = center
    valign = bottom

    zindex = 1
}
